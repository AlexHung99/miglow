<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重設密碼｜微光 MI GLOW</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#F4EFE7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  <script src="assets/js/data.js" defer></script>
  <script src="assets/js/components.js" defer></script>
  <script src="assets/js/config.js" defer></script>
  <script src="assets/js/store.js" defer></script>
  <script src="assets/js/account.js" defer></script>
</head>
<body data-page="account">
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="page-section">
      <div class="container">
        <div class="auth-wrap">
          <div class="auth-card">
            <h1>重設密碼</h1>
            <p class="sub">請設定您的新密碼。</p>
            <div id="authNotice"></div>
            <form id="resetForm" class="form" novalidate>
              <div class="field">
                <label for="password">新密碼<span class="req">*</span></label>
                <div class="pw-wrap">
                  <input class="input" id="password" type="password" autocomplete="new-password" placeholder="至少 6 碼">
                  <button type="button" class="pw-toggle" data-toggle="password" aria-label="顯示密碼"></button>
                </div>
                <div class="field-error"></div>
              </div>
              <div class="field">
                <label for="password2">確認新密碼<span class="req">*</span></label>
                <div class="pw-wrap">
                  <input class="input" id="password2" type="password" autocomplete="new-password">
                  <button type="button" class="pw-toggle" data-toggle="password2" aria-label="顯示密碼"></button>
                </div>
                <div class="field-error"></div>
              </div>
              <button class="btn btn--solid btn--block" type="submit">設定新密碼</button>
            </form>
            <div class="auth-foot"><a href="login.html">← 返回登入</a></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
</body>
</html>
